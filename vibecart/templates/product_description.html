{% load static %}
<div class="small-container single-product">
        <div class="row">
            <div class="col-2">
                <img src="   {{ product.image.url }}" width="100%" id="ProductImg">

                <div class="small-img-row">
                    <div class="small-img-col">
                        {% if product.small_image1 %}
                         <img src="{{ product.small_image1.url }}" width="100%" class="small-img">
                        {% endif %}
                    </div>
                    <div class="small-img-col">
                        {% if product.small_image2 %}
                         <img src="{{ product.small_image2.url }}" width="100%" class="small-img">
                        {% endif %}
                    </div>
                    <div class="small-img-col">
                        {% if product.small_image3 %}
                         <img src="{{ product.small_image3.url }}" width="100%" class="small-img">
                        {% endif %}
                    </div>
                </div>

            </div>
            <div class="col-2">
                <p>{{ product.title }}</p>
                <h1>{{ product.title }}</h1>
                <h4>₹{{ product.price|floatformat:2 }}</h4>
                <select>
                    <option>Select Size</option>
                    <option>XXL</option>
                    <option>XL</option>
                    <option>L</option>
                    <option>M</option>
                    <option>S</option>
                </select>
                <input type="number" value="1">
                <a href="" class="btn">Add To Cart</a>

                <h3>Product Details <i class="fa fa-indent"></i></h3>
                <br>
                <p>{{ product.description }}</p>
            </div>
        </div>
    </div>
